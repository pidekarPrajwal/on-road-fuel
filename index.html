<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Road Fuel Demand Analyzer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Road Fuel Demand Analyzer</h1>
      <form id="fuelForm">
        <label for="date">Date:</label>
        <input type="date" id="date" required />

        <label for="distance">Distance (km):</label>
        <input type="number" id="distance" required />

        <label for="fuelConsumed">Fuel Consumed (liters):</label>
        <input type="number" id="fuelConsumed" required />

        <button type="submit">Submit</button>
      </form>

      <h2>Fuel Demand Data</h2>
      <table id="fuelData">
        <thead>
          <tr>
            <th>Date</th>
            <th>Distance (km)</th>
            <th>Fuel Consumed (liters)</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data will be inserted here -->
        </tbody>
      </table>
    </div>
    <script src="script.js"></script>
  </body>
</html>
